name: "Build"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "utama"]
  release:
    types:
      - published

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Explicit Submodule Update
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        id: setup_sdk
        uses: android-actions/setup-android@v3

      - name: Read Versions
        run: |
          echo "GEOIP_VERSION=$(grep 'GEOIP_VERSION' version.properties | cut -d '=' -f 2)" >> $GITHUB_ENV
          echo "GEOSITE_VERSION=$(grep 'GEOSITE_VERSION' version.properties | cut -d '=' -f 2)" >> $GITHUB_ENV

      - name: Setup Keystore and Properties
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > ./store.jks
          echo "storeFile=store.jks" > ./store.properties
          echo "storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" >> ./store.properties
          echo "keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> ./store.properties
          echo "keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> ./store.properties

      - name: Download Rules Files
        run: |
          # Mencari folder assets di dalam sub-folder project secara otomatis
          ASSETS_DIR=$(find . -type d -name "assets" | head -n 1)
          echo "Folder assets ditemukan di: $ASSETS_DIR"
          wget https://github.com/malikshi/v2ray-rules-dat/releases/latest/download/geosite.dat -O "$ASSETS_DIR/geoip.dat"
          wget https://github.com/malikshi/v2ray-rules-dat/releases/latest/download/geoip.dat -O "$ASSETS_DIR/geosite.dat"

      - name: Prepare Xray-core v26.1.23 Libraries
        run: |
          # Deteksi otomatis letak folder utama (main) di dalam repositori
          MAIN_DIR=$(find . -type d -name "main" | head -n 1)
          echo "Folder utama ditemukan di: $MAIN_DIR"
          
          # Membuat folder jniLibs yang bersih langsung di jalur project yang benar
          mkdir -p "$MAIN_DIR/jniLibs/arm64-v8a"
          mkdir -p "$MAIN_DIR/jniLibs/x86_64"

          # Download dan ekstrak rilis resmi resmi untuk arm64-v8a
          echo "Downloading Xray-core v26.1.23 for arm64-v8a..."
          wget -q https://github.com/XTLS/Xray-core/releases/download/v26.1.23/Xray-android-arm64-v8a.zip
          unzip -q Xray-android-arm64-v8a.zip -d arm64_temp
          mv arm64_temp/xray "$MAIN_DIR/jniLibs/arm64-v8a/libxray.so"
          rm -rf Xray-android-arm64-v8a.zip arm64_temp

          # Download dan ekstrak rilis resmi resmi untuk x86_64
          echo "Downloading Xray-core v26.1.23 for x86_64..."
          wget -q https://github.com/XTLS/Xray-core/releases/download/v26.1.23/Xray-android-x86_64.zip
          unzip -q Xray-android-x86_64.zip -d x86_64_temp
          mv x86_64_temp/xray "$MAIN_DIR/jniLibs/x86_64/libxray.so"
          rm -rf Xray-android-x86_64.zip x86_64_temp

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Find and Copy APKs
        run: |
          mkdir -p apks
          # Mencari file .apk hasil compile dan mengumpulkannya ke folder apks
          find . -name "*.apk" -exec cp {} apks/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simplexray-apks
          path: apks/
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: "simplexray-*"
          merge-multiple: true

      - name: Upload artifacts to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in release/*; do
            if [ -f "$i" ]; then
              gh release upload ${{ github.event.release.tag_name }} "$i"
            fi
          done
